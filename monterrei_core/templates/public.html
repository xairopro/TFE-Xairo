{% extends "base.html" %}
{% block title %}Monterrei – Público{% endblock %}
{% block head %}
<style>
  body { background: #000; color: var(--fg);
         display: flex; flex-direction: column; align-items: center;
         padding: 1.5rem; min-height: 100vh; }
  h1 { font-family: var(--mono); font-size: 0.85rem; letter-spacing: 0.3em;
        color: var(--fg-dim); text-transform: uppercase; margin-bottom: 1rem; }
  #timer { font-family: var(--mono); font-size: 2rem; color: var(--neon-cyan);
           margin-bottom: 1rem; }
  #voting-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.6rem; width: 100%; max-width: 480px; }
  .vote-btn { padding: 1.4rem 0.5rem; font-family: var(--mono); font-size: 1.1rem;
              background: var(--bg-card); border: 1px solid var(--fg-dim);
              color: var(--fg); border-radius: 4px; cursor: pointer;
              transition: all 0.15s; }
  .vote-btn:hover, .vote-btn.selected { transform: scale(1.02); }
  .vote-btn.selected { box-shadow: 0 0 16px currentColor; border-color: currentColor; }
  .vote-btn { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; }
  .vote-loop-name { font-size: 1.1rem; }
  .vote-loop-sub  { font-size: 0.7rem; opacity: 0.7; letter-spacing: 0.05em; }
  #shutdown {
    display: none; flex-direction: column; align-items: center; gap: 1rem;
    padding-top: 4rem;
  }
  #shutdown-btn {
    width: 80vw; max-width: 380px; aspect-ratio: 1;
    border-radius: 50%; border: none; background: var(--neon-red);
    color: #000; font-family: var(--mono); font-size: 1.6rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    box-shadow: 0 0 32px var(--neon-red);
    cursor: pointer; transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, transform 0.1s ease;
  }
  #shutdown-btn:active { transform: scale(0.96); }
  #shutdown-btn.pressed,
  #shutdown-btn:disabled {
    background: #000; color: var(--neon-red);
    border: 2px solid var(--neon-red);
    box-shadow: 0 0 18px rgba(255,42,85,0.5) inset, 0 0 8px var(--neon-red);
    cursor: not-allowed;
  }
  #shutdown-cooldown { font-family: var(--mono); font-size: 0.85rem; color: var(--fg-dim); }
  #last-silenced { font-family: var(--mono); font-size: 1.4rem; color: var(--neon-red);
                    text-shadow: 0 0 12px var(--neon-red); letter-spacing: 0.1em;
                    margin-top: 1.2rem; min-height: 1.6em; text-align: center;
                    text-transform: uppercase; }
  #last-silenced .who { display:block; font-size: 0.65rem; color: var(--fg-dim);
                         letter-spacing: 0.3em; margin-bottom: 0.3rem; text-shadow:none; }
  #idle { color: var(--fg-dim); font-family: var(--mono); margin-top: 4rem; text-align: center; }

  /* Aviso fullscreen de "Comeza votación!" */
  #vote-announce { position: fixed; inset: 0; display: none;
                    background: radial-gradient(ellipse at center, #0a0d12 0%, #000 80%);
                    align-items: center; justify-content: center; z-index: 9999;
                    color: var(--neon-cyan); font-family: var(--mono); padding: 1rem;
                    text-align: center; text-transform: uppercase;
                    text-shadow: 0 0 24px var(--neon-cyan); font-weight: 700;
                    letter-spacing: 0.04em; font-size: 12vw; line-height: 1; }
</style>
{% endblock %}
{% block body %}
<h1>>> MONTERREI · PÚBLICO</h1>
<div id="voting" style="display:none; width:100%; max-width: 480px;">
  <div id="timer">--:--</div>
  <div id="voting-grid"></div>
</div>
<div id="shutdown">
  <button id="shutdown-btn">Apagar música</button>
  <div id="shutdown-cooldown"></div>
  <div id="last-silenced"></div>
</div>
<div id="idle">Agarda á seguinte quenda...</div>
<div id="vote-announce">Comeza votación!</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/public.js"></script>
{% endblock %}
