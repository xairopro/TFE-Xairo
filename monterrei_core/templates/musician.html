{% extends "base.html" %}
{% block title %}Monterrei – Músicos{% endblock %}
{% block head %}
<style>
  body { display: flex; flex-direction: column; min-height: 100vh; }
  #selector { padding: 2rem; max-width: 480px; margin: 0 auto; }
  #selector h1 { font-family: var(--mono); font-size: 1.1rem;
                  letter-spacing: 0.2em; margin-bottom: 1.5rem; color: var(--fg-dim); }
  #stage {
    display: none; flex: 1; align-items: center; justify-content: center;
    background: #000; color: #fff;
    text-align: center; padding: 2rem;
    transition: background 0.25s ease;
  }
  #stage.playing { background: var(--neon-green); color: #000; }
  #stage.flash { animation: flash 0.5s ease 1; }
  #stage.fin { background: #000; color: var(--neon-red); }
  @keyframes flash { 0% { filter: brightness(2.4); } 100% { filter: brightness(1); } }
  #label { font-family: var(--mono); font-size: 1.4rem; letter-spacing: 0.12em;
           text-transform: uppercase; }
  #suffix { font-family: var(--mono); font-size: 3rem; margin-top: 1rem; font-weight: 700; }
  #bar-info { font-family: var(--mono); font-size: 1.1rem; opacity: 0.7;
              position: fixed; top: 1rem; right: 1rem; }
  select { width: 100%; padding: 0.9rem; font-size: 1rem; }
  button { width: 100%; margin-top: 1rem; padding: 0.9rem; font-size: 0.9rem; }
</style>
{% endblock %}
{% block body %}
<div id="selector">
  <h1 class="mono">>> SELECCIONA INSTRUMENTO</h1>
  <select id="inst-select"></select>
  <button id="confirm" class="primary">CONFIRMAR</button>
  <p class="dim mono" style="margin-top:1rem; font-size:0.7rem;">
    SID: <span class="mono">{{ sid }}</span>
  </p>
</div>
<div id="stage">
  <div>
    <div id="label">—</div>
    <div id="suffix"></div>
  </div>
  <div id="bar-info"></div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/musician.js"></script>
{% endblock %}
